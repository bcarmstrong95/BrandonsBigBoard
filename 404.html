<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    (function () {
      var path = window.location.pathname;
      var search = window.location.search || "";
      var hash = window.location.hash || "";

      // Send pretty player URLs back to player.html
      if (/^\/2026\/[^\/]+\/[^\/]+\/?$/.test(path)) {
        window.location.replace("/player.html?p=" + encodeURIComponent(path) + search + hash);
        return;
      }

      // Fallback: send everything else to index.html
      window.location.replace("/index.html");
    })();
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
