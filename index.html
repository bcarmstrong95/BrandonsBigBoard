function gcd(a,b){ return b?gcd(b,a%b):a; }

function decimalToFraction(decimal){

let num = parseFloat(decimal);
if(isNaN(num)) return decimal;

// Work only with decimal portion (0–1)
let denom = 8;
let numerator = Math.round(num * denom);

if(numerator === 0) return "";
if(numerator === denom) return "1";

let divisor = gcd(numerator, denom);
numerator /= divisor;
denom /= divisor;

return numerator + "/" + denom;
}

function fractionToDecimal(val){
if(!val||val==="-" ) return null;
let clean=val.replace(/"/g,"").trim();
if(clean.includes("/")){
let parts=clean.split(" ");
let whole=parseFloat(parts[0])||0;
let frac=0;
if(parts[1]){
let f=parts[1].split("/");
frac=parseFloat(f[0])/parseFloat(f[1]);
}
return whole+frac;
}
return parseFloat(clean);
}

function heightToInches(val){
if(!val||val==="-" ) return null;
let clean=val.replace(/"/g,"");
let parts=clean.split("'");

let feet=parseFloat(parts[0]) || 0;
let inches = parts[1] ? fractionToDecimal(parts[1]) : 0;

return (feet*12) + (inches || 0);
}

border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
    ">${c}</div>`;

    tr.appendChild(td);
    return;
}

if(headerClean === "c#" && cColorIndex > -1){
    const colorVal = String(r[cColorIndex] || "").trim();
    if(colorVal) td.style.color = colorVal;
}

// Convert measurement columns
if(
    i === heightIndex ||
    i === handIndex ||
    i === armIndex ||
    i === wingspanIndex
){

    let original = String(c);

    // 🔥 If sheet already contains a fraction → KEEP EXACTLY AS-IS
    if(original.includes("/")){
        displayValue = original;
    }
    else{

        let hasQuote = original.includes('"');
        let clean = original.replace(/"/g,"").trim();

        // HEIGHT column (example: 6'2.75)
        if(i === heightIndex && clean.includes("'")){

            let parts = clean.split("'");
            let feet = parts[0];
            let inchesDecimal = parseFloat(parts[1]);

            if(!isNaN(inchesDecimal)){
                let whole = Math.floor(inchesDecimal);
                let decimal = inchesDecimal - whole;

                let fraction = decimal > 0
                    ? " " + decimalToFraction(decimal)
                    : "";

                displayValue = `${feet}'${whole}${fraction}`;
            }
            else{
                displayValue = clean;
            }
        }
        else{
            let num = parseFloat(clean);

            if(!isNaN(num)){
                let whole = Math.floor(num);
                let decimal = num - whole;

                let fraction = decimal > 0
                    ? " " + decimalToFraction(decimal)
                    : "";

                displayValue = `${whole}${fraction}`;
            }
            else{
                displayValue = clean;
            }
        }

        if(hasQuote){
            displayValue += '"';
        }
    }
}
else{

    let headerName = headers[i].toLowerCase();

    // Do NOT modify Vertical or Broad
    if(
        headerName === "vertical" ||
        headerName === "broad"
    ){
        displayValue = c; // keep EXACTLY as sheet
    }
    else{

        let num = parseFloat(c);

        if(!isNaN(num)){
            displayValue = (Math.round(num * 1000) / 1000).toFixed(3);
            displayValue = displayValue.replace(/\.?0+$/, '');
        }
    }
}

    td.textContent = displayValue;
}

if(i===currentSort) td.classList.add("active-col");
tr.appendChild(td);
});
tbody.appendChild(tr);
});

}
function initializeFilters(){

    const buttonContainer = document.getElementById("positionButtons");

    if(positionIndex > -1){

        // Custom Order
        const orderedPositions = [
            "QB","RB","WR","TE","IOL","OT",
            "DT","EDGE","LB","S","CB",
            "K","P","LS"
        ];

        orderedPositions.forEach(pos => {

            const button = document.createElement("button");
            button.textContent = pos;
            button.classList.add("position-btn");

            button.addEventListener("click", () => {

                if(selectedPositions.includes(pos)){
                    selectedPositions = selectedPositions.filter(p => p !== pos);

                    button.classList.remove("active");
                    button.style.background = "#111";
                    button.style.borderColor = "#444";
                } 
                else {
                    selectedPositions.push(pos);
                    button.classList.add("active");

                    // Special teams = gray
                    if(pos === "K" || pos === "P" || pos === "LS"){
                        button.style.background = "gray";
                        button.style.borderColor = "gray";
                    }
                    else{
                        button.style.background = positionColors[pos] || "#4169E1";
                        button.style.borderColor = positionColors[pos] || "#4169E1";
                    }
                }

                applyFilters();
            });

            buttonContainer.appendChild(button);
        });
    }

    document.getElementById("searchInput").addEventListener("input", e=>{
        searchTerm = e.target.value.toLowerCase();
        applyFilters();
    });
}

function applyFilters(){

    filteredData=data.filter(row=>{

        const matchesSearch=row.some(cell=>
            String(cell).toLowerCase().includes(searchTerm)
        );

       const matchesPosition =
    positionIndex === -1 ||
    selectedPositions.length === 0 ||
    selectedPositions.includes(row[positionIndex]);
    const matchesSchool =
selectedSchool === null ||
row.some(cell => String(cell).trim() === selectedSchool);

return matchesSearch && matchesPosition && matchesSchool;
    });

    // Re-apply current sort if one exists
   if(currentSort !== -1){
    sortTable(currentSort);
} else {
    displayRows();
}

document.getElementById("prospectCount").textContent = filteredData.length;
}

    "C#": "Consensus Ranking according to NFLMockDraftDatabase.com",

};

function createHeaders(){

const thead=document.querySelector("#data-table thead");
const row=document.createElement("tr");

headers.forEach((h,i)=>{

const th=document.createElement("th");

th.innerHTML = h + ' <span class="arrow"></span>';

th.addEventListener("click",()=>sortTable(i));

/* Professional Tooltip */

const cleanHeader = h.trim();

if(columnDescriptions[cleanHeader]){

    const tooltip = document.getElementById("tooltip");

    th.addEventListener("mouseenter", e=>{
        tooltip.textContent = columnDescriptions[cleanHeader];
        tooltip.classList.add("show");
    });

    th.addEventListener("mousemove", e=>{
        tooltip.style.left = (e.clientX + 12) + "px";
        tooltip.style.top = (e.clientY + 12) + "px";
    });

    th.addEventListener("mouseleave", ()=>{
        tooltip.classList.remove("show");
    });

}
row.appendChild(th);

});

thead.appendChild(row);

}
/* ================================
   NFL Draft Countdown Timer
================================ */

function startDraftCountdown(){

    const draftDate = new Date("2026-04-23T20:00:00-04:00");

    function updateCountdown(){

        const now = new Date();
        const diff = draftDate - now;

        if(diff <= 0){
            document.getElementById("days").textContent="00";
            document.getElementById("hours").textContent="00";
            document.getElementById("minutes").textContent="00";
            document.getElementById("seconds").textContent="00";
            return;
        }

        const days = Math.floor(diff/(1000*60*60*24));
        const hours = Math.floor((diff/(1000*60*60))%24);
        const minutes = Math.floor((diff/(1000*60))%60);
        const seconds = Math.floor((diff/1000)%60);

function flipUpdate(id,val){

const el=document.getElementById(id);

if(el.dataset.val == val) return;

el.dataset.val = val;

const top = el.querySelector(".flip-top");
const bottom = el.querySelector(".flip-bottom");

top.textContent = val;
bottom.textContent = val;

top.classList.remove("flip");
bottom.classList.remove("flip");

void top.offsetWidth;

top.classList.add("flip");
bottom.classList.add("flip");

}
flipUpdate("days",days.toString());
flipUpdate("hours",hours.toString().padStart(2,"0"));
flipUpdate("minutes",minutes.toString().padStart(2,"0"));
flipUpdate("seconds",seconds.toString().padStart(2,"0"));
    }
updateCountdown();
setInterval(updateCountdown,1000);
}
startDraftCountdown();
</script>
