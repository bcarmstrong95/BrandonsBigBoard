<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Brandon's Big Board</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<style>
body{background:black;color:white;font-family:Arial;margin:0;}
.hero-banner{background:linear-gradient(135deg,#0a0a0a,#1a0a0a);border-top:1px solid #222;border-bottom:1px solid #222;padding:30px 20px;text-align:center;}
.meta-info{margin-top:12px;font-size:15px;color:#ccc;}
.top-logos{display:flex;justify-content:center;align-items:center;gap:80px;padding:40px 0 20px 0;}
.top-logos img{height:285px;object-fit:contain;}
.table-wrapper{overflow:auto;max-height:75vh;margin:20px;}
table{border-collapse:separate;border-spacing:0;width:100%;min-width:max-content;}
th,td{padding:8px 14px;text-align:center;white-space:nowrap;}
th{background:#4169E1;cursor:pointer;position:sticky;top:0;z-index:1000;}
th .arrow{margin-left:6px;font-weight:bold;}
th.sorted{background:#162b55!important;}
.active-col{background:#1c1c1c!important;}

.school-logo{
    height:70px;
    width:auto;
    max-width:70px;
    object-fit:contain;
    vertical-align:middle;
    display:block;
    margin:auto;
}

tbody tr:nth-child(even){
    background:#111;
}

tbody tr:hover{
    background:#1a1a1a;
}
/* Mobile logo resize only */
@media (max-width: 768px){

    .top-logos{
        gap:20px;
        padding:20px 0 10px 0;
    }

    .top-logos img{
        height:120px;
    }
}

/* Position filter buttons */
.position-btn{
    padding:6px 12px;
    border-radius:20px;
    border:1px solid #444;
    background:#111;
    color:white;
    cursor:pointer;
    font-size:13px;
    transition:all .2s ease;
}

.position-btn:hover{
    background:#222;
}

.position-btn.active{
    background:#4169E1;
    border-color:#4169E1;
}
</style>
</head>
<body>

<div class="hero-banner">
<h1>Brandon's Big Board 2026</h1>
<h2>2026 NFL Draft Database</h2>
<div class="meta-info">Prospects: <span id="prospectCount">Loading...</span></div>
</div>

<div class="top-logos">
<img src="comby.png">
<img src="NFLLogo.png">
<img src="Draft26.jpg">
</div>

    <div style="display:flex;flex-wrap:wrap;gap:15px;align-items:center;justify-content:center;margin:20px;">

    <!-- Search Bar -->
    <input 
        type="text" 
        id="searchInput" 
        placeholder="Search players..." 
        style="padding:8px 12px;border-radius:6px;border:none;font-size:14px;width:220px;"
    >

    <!-- Position Filter -->
<div style="display:flex;flex-direction:column;align-items:center;">
    <label style="font-size:13px;margin-bottom:6px;color:#ccc;">
        Filter by Position
    </label>

    <div id="positionButtons" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;"></div>
</div>
</div>
<div class="table-wrapper">
<table id="data-table">
<thead></thead>
<tbody></tbody>
</table>
</div>

<script>
const csvUrl="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0uaGV-62aAS74y5I-HVKCtGd8l5vy0iaNOErDHjQBFXNt2kDKhAEUMRQDGckqQoJqjUtwnKqTWqgR/pub?gid=0&single=true&output=csv";

let headers=[], data=[], filteredData=[];
let currentSort=-1, sortAsc=true;
let heightIndex=-1, positionIndex=-1;
let handIndex=-1, armIndex=-1, wingspanIndex=-1;

let searchTerm="";
let selectedPositions=[];

const positionColors={
"EDGE":"orange","OT":"#39FF14","IOL":"yellow","WR":"#B8860B",
"RB":"darkgreen","S":"magenta","TE":"#800080","DT":"turquoise",
"CB":"red","LB":"royalblue","QB":"gray"
};

const schoolLogos = {

    "Michigan": "michigan.png",
    "Ohio St.": "osu1.png",
    "Alabama": "bama.svg",
    "Indiana": "iu1.png",
    "LSU": "lsu2.png",
    "Iowa": "iowa2.png",
    "Kansas St.": "ksu2.png",
    "Utah": "utah.png",
    "Miami": "miami.png",
    "Texas Tech": "texastech.png",
    "Tennessee": "tennessee.png",
    "UCF": "ucf5.png",
    "Notre Dame": "notredame.png",
    "Arizona St.": "arizonast2.png",
    "Washington": "washington.png",
    "Penn St.": "pennst.png",
    "Oklahoma": "oklahoma.png",
    "Oregon": "oregon.png",
    "Texas A&M": "atm.png",
    "Auburn": "auburn.png",
    "USC": "usc.png",
    "Georgia": "georgia.png",
    "Clemson": "clemson.png",
    "Florida": "florida.png",
    "UConn": "uconn.png",
    "Missouri": "mizz.png",
    "Texas": "texas.png",
    "SDSU": "sdsu.png",
    "S. Carolina": "sc.png",
    "Toledo": "toledo.png",
    "Louisville": "louis.png",
    "Pitt": "pitt.png",
    "Northwestern": "nw.png",
    "Cincinnati": "cin2.png",
    "Duke": "duke.png",
    "Illinois": "ill.png",
    "Arkansas": "ark.png",
    "Kentucky": "uk.png",
    "Ole Miss": "ole.png",
    "SMU": "smu2.png",
    "TCU": "tcu.png",
    "Wisconsin": "wis.png",
    "Wyoming": "wyo.png",
    "Arizona": "zona.png",
    "Baylor": "bay.png",
    "BC": "bc.svg",
    "BYU": "byu.png",
    "GT": "gt.png",
    "NC State": "ncst.png",
    "Nebraska": "neb.png"
};
function gcd(a,b){ return b?gcd(b,a%b):a; }

function roundThousandth(val){
let num=parseFloat(val);
if(isNaN(num)) return val;
return Math.round(num*1000)/1000;
}

function decimalToFraction(decimal){

let num = parseFloat(decimal);
if(isNaN(num)) return decimal;

// Work only with decimal portion (0–1)
let denom = 8;
let numerator = Math.round(num * denom);

if(numerator === 0) return "";
if(numerator === denom) return "1";

let divisor = gcd(numerator, denom);
numerator /= divisor;
denom /= divisor;

return numerator + "/" + denom;
}

function fractionToDecimal(val){
if(!val||val==="-" ) return null;
let clean=val.replace(/"/g,"").trim();
if(clean.includes("/")){
let parts=clean.split(" ");
let whole=parseFloat(parts[0])||0;
let frac=0;
if(parts[1]){
let f=parts[1].split("/");
frac=parseFloat(f[0])/parseFloat(f[1]);
}
return whole+frac;
}
return parseFloat(clean);
}

function heightToInches(val){
if(!val||val==="-" ) return null;
let clean=val.replace(/"/g,"");
let parts=clean.split("'");
let feet=parseFloat(parts[0]);
let inches=fractionToDecimal(parts[1]);
return feet*12+inches;
}

Papa.parse(csvUrl,{
download:true,
skipEmptyLines:true,
complete:function(results){

headers=results.data[1].map(h=>h.trim());
heightIndex=headers.findIndex(h=>h.toLowerCase()==="height");
positionIndex=headers.findIndex(h=>h.toLowerCase()==="pos");
handIndex=headers.findIndex(h=>h.toLowerCase()==="hand");
armIndex=headers.findIndex(h=>h.toLowerCase()==="arm");
wingspanIndex=headers.findIndex(h=>h.toLowerCase()==="wingspan");

data=results.data.slice(2).filter(r=>r.length===headers.length);

// Keep sheet values exactly as-is
data = data.map(row => row.map(cell => cell));

filteredData=[...data];

createHeaders();
initializeFilters();
applyFilters();


}
});

function sortTable(col){

    let header=headers[col].toLowerCase();

   if(currentSort===col){
    sortAsc=!sortAsc;
}else{
    currentSort=col;

    // Columns that should default to A–Z
    if(header==="name" || header==="school" || header==="pos"){
        sortAsc=true;
    }
   // Columns that should default low→high
else if(
    header === "age" ||
    header === "40" ||
    header.includes("40")
){
    sortAsc = true;
}
    // Everything else defaults high→low
    else{
        sortAsc=false;
    }
}
    filteredData.sort((a,b)=>{

        let v1=a[col];
        let v2=b[col];

        if(col===heightIndex){
            v1=heightToInches(v1);
            v2=heightToInches(v2);
        }
        else if(col===handIndex||col===armIndex||col===wingspanIndex){
            v1=fractionToDecimal(v1);
            v2=fractionToDecimal(v2);
        }
       else{

    let headerName = headers[col].toLowerCase();
    let raw1 = String(v1).trim();
    let raw2 = String(v2).trim();

    let isBlank1 = raw1 === "" || raw1 === "-";
    let isBlank2 = raw2 === "" || raw2 === "-";

    // Special rule ONLY for Age and 40
    if(headerName === "age" || headerName === "40"){

        // Always push blanks to bottom
        if(isBlank1 && !isBlank2) return 1;
        if(!isBlank1 && isBlank2) return -1;
        if(isBlank1 && isBlank2) return 0;

        let num1 = parseFloat(raw1);
        let num2 = parseFloat(raw2);

        return num1 - num2; // always lowest first
    }

    let n1 = parseFloat(raw1);
    let n2 = parseFloat(raw2);

    if(!isNaN(n1) && !isNaN(n2)){

        n1 = Math.round(n1 * 1000) / 1000;
        n2 = Math.round(n2 * 1000) / 1000;

        v1 = n1;
        v2 = n2;
    }
    else{
        return sortAsc
            ? raw1.localeCompare(raw2)
            : raw2.localeCompare(raw1);
    }
}
        return sortAsc ? v1 - v2 : v2 - v1;

    });

    document.querySelectorAll("th").forEach(th=>{
        th.classList.remove("sorted");
        th.querySelector(".arrow").textContent="";
    });

    const active=document.querySelectorAll("th")[col];
    active.classList.add("sorted");
    active.querySelector(".arrow").textContent=sortAsc?"▲":"▼";

    displayRows();
}
function displayRows(){
const tbody=document.querySelector("#data-table tbody");
tbody.innerHTML="";

filteredData.forEach(r=>{
const tr=document.createElement("tr");

if(positionIndex>-1){
let pos=r[positionIndex];
if(positionColors[pos]) tr.style.color=positionColors[pos];
}

r.forEach((c,i)=>{
const td=document.createElement("td");

if(headers[i].toLowerCase().includes("school")){

    const cleanSchool = String(c).trim();

    if(schoolLogos[cleanSchool]){
        td.innerHTML = `<img src="${schoolLogos[cleanSchool]}" class="school-logo">`;
    } 
    else{
        td.textContent = c;
    }
}
else{

    let displayValue = c;
    let header = headers[i].toLowerCase();

   // Convert measurement columns to simplified fractions
if(
    i === heightIndex ||
    i === handIndex ||
    i === armIndex ||
    i === wingspanIndex
){

    let valueStr = String(c);
    let hasQuote = valueStr.includes('"');
    let clean = valueStr.replace(/"/g, "");

    // HEIGHT (example: 6'2.75)
    if(i === heightIndex && clean.includes("'")){
        let parts = clean.split("'");
        let feet = parts[0];
        let inches = parseFloat(parts[1]);

        if(!isNaN(inches)){
            let whole = Math.floor(inches);
            let decimal = inches - whole;

            let fraction = decimal > 0
                ? " " + decimalToFraction(decimal.toString())
                : "";

            displayValue = `${feet}'${whole}${fraction}`;
        }
        else{
            displayValue = clean;
        }
    }
    else{
        let num = parseFloat(clean);

        if(!isNaN(num)){
            let whole = Math.floor(num);
            let decimal = num - whole;

            let fraction = decimal > 0
                ? " " + decimalToFraction(decimal.toString())
                : "";

            displayValue = `${whole}${fraction}`;
        }
        else{
            displayValue = clean;
        }
    }

    if(hasQuote){
        displayValue += '"';
    }
}
else{

    let headerName = headers[i].toLowerCase();

    // Do NOT modify Vertical or Broad
    if(
        headerName === "vertical" ||
        headerName === "broad"
    ){
        displayValue = c; // keep EXACTLY as sheet
    }
    else{

        let num = parseFloat(c);

        if(!isNaN(num)){
            displayValue = (Math.round(num * 1000) / 1000).toFixed(3);
            displayValue = displayValue.replace(/\.?0+$/, '');
        }
    }
}

    td.textContent = displayValue;
}

if(i===currentSort) td.classList.add("active-col");
tr.appendChild(td);
});
tbody.appendChild(tr);
});
}
function initializeFilters(){

    const buttonContainer = document.getElementById("positionButtons");

    if(positionIndex > -1){

        const uniquePositions = [
            ...new Set(data.map(r => r[positionIndex]).filter(Boolean))
        ].sort();

        uniquePositions.forEach(pos => {

            const button = document.createElement("button");
            button.textContent = pos;
            button.classList.add("position-btn");

            button.addEventListener("click", () => {

                if(selectedPositions.includes(pos)){
                    selectedPositions = selectedPositions.filter(p => p !== pos);

                    button.classList.remove("active");
                    button.style.background = "#111";
                    button.style.borderColor = "#444";
                } 
                else {
                    selectedPositions.push(pos);

                    button.classList.add("active");
                    button.style.background = positionColors[pos] || "#4169E1";
                    button.style.borderColor = positionColors[pos] || "#4169E1";
                }

                applyFilters();
            });

            buttonContainer.appendChild(button); // <-- REQUIRED
        });
    }

    document.getElementById("searchInput").addEventListener("input", e=>{
        searchTerm = e.target.value.toLowerCase();
        applyFilters();
    });
}

function applyFilters(){

    filteredData=data.filter(row=>{

        const matchesSearch=row.some(cell=>
            String(cell).toLowerCase().includes(searchTerm)
        );

       const matchesPosition =
    positionIndex === -1 ||
    selectedPositions.length === 0 ||
    selectedPositions.includes(row[positionIndex]);

        return matchesSearch && matchesPosition;
    });

    // Re-apply current sort if one exists
   if(currentSort !== -1){
    sortTable(currentSort);
} else {
    displayRows();
}

document.getElementById("prospectCount").textContent = filteredData.length;
}
function createHeaders(){
const thead=document.querySelector("#data-table thead");
const row=document.createElement("tr");
headers.forEach((h,i)=>{
const th=document.createElement("th");
th.innerHTML=h+' <span class="arrow"></span>';
th.addEventListener("click",()=>sortTable(i));
row.appendChild(th);
});
thead.appendChild(row);
}
</script>

</body>
</html>
