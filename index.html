function gcd(a,b){ return b?gcd(b,a%b):a; }

function decimalToFraction(decimal){

let num = parseFloat(decimal);
if(isNaN(num)) return decimal;

// Work only with decimal portion (0–1)
let denom = 8;
let numerator = Math.round(num * denom);

if(numerator === 0) return "";
if(numerator === denom) return "1";

let divisor = gcd(numerator, denom);
numerator /= divisor;
denom /= divisor;

return numerator + "/" + denom;
}

function fractionToDecimal(val){
if(!val||val==="-" ) return null;
let clean=val.replace(/"/g,"").trim();
if(clean.includes("/")){
let parts=clean.split(" ");
let whole=parseFloat(parts[0])||0;
let frac=0;
if(parts[1]){
let f=parts[1].split("/");
frac=parseFloat(f[0])/parseFloat(f[1]);
}
return whole+frac;
}
return parseFloat(clean);
}

function heightToInches(val){
if(!val||val==="-" ) return null;
let clean=val.replace(/"/g,"");
let parts=clean.split("'");

let feet=parseFloat(parts[0]) || 0;
let inches = parts[1] ? fractionToDecimal(parts[1]) : 0;

return (feet*12) + (inches || 0);
}
function escapeHtml(str){
return String(str)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;");
}

function formatFractionCell(value){
const safe = escapeHtml(value);
return safe.replace(/(\d+\s+)?(\d+\/\d+)/g, (match, whole = "", frac) => {
    return `${whole}<span class="fraction-part">${frac}</span>`;
});
}
function getCompactTextClass(value){
const str = String(value ?? "").trim();

if(str.length >= 12) return "ultra-compact-text";
if(str.length >= 9) return "compact-text";

return "";
}

function sortTable(col){

    let header=headers[col].toLowerCase();

if(currentSort === col){
    sortAsc = !sortAsc;
}else{
    currentSort = col;

    // FIRST TWO COLUMNS → always low to high on first click
    if(col === 0 || col === 1){
        sortAsc = true;
    }

    // Age + 40 → lowest first
    else if(
        header === "age" ||
        header === "40" ||
        header.includes("40")
    ){
        sortAsc = true;
    }

    // Name / School / Pos → A–Z first
    else if(
        header === "name" ||
        header === "school" ||
        header === "pos"
    ){
        sortAsc = true;
    }

    // Everything else → high to low first
    else{
        sortAsc = false;
    }
}
filteredData.sort((a,b)=>{

    let raw1 = String(a[col] ?? "").trim();
    let raw2 = String(b[col] ?? "").trim();

    // Force these values to ALWAYS go to bottom
    const invalidValues = ["", "-", "0", "#DIV/0!"];

    let isInvalid1 = invalidValues.includes(raw1);
    let isInvalid2 = invalidValues.includes(raw2);

    if(isInvalid1 && isInvalid2) return 0;
    if(isInvalid1) return 1;
    if(isInvalid2) return -1;

    // HEIGHT sorting
    if(col === heightIndex){
        let h1 = heightToInches(raw1);
        let h2 = heightToInches(raw2);
        return sortAsc ? h1 - h2 : h2 - h1;
    }

    // HAND / ARM / WINGSPAN sorting
    if(
        col === handIndex ||
        col === armIndex ||
        col === wingspanIndex
    ){
        let f1 = fractionToDecimal(raw1);
        let f2 = fractionToDecimal(raw2);
        return sortAsc ? f1 - f2 : f2 - f1;
    }
    // BROAD sorting (10'5")
if(col === broadIndex){

    function broadToInches(val){
        if(!val) return null;

        let match = val.match(/(\d+)\s*['’]\s*(\d+)\s*"/);
        if(!match) return null;

        let feet = parseInt(match[1]);
        let inches = parseInt(match[2]);

        return (feet * 12) + inches;
    }

    let b1 = broadToInches(raw1);
    let b2 = broadToInches(raw2);

if(b1 === null && b2 === null) return 0;
if(b1 === null) return 1;
if(b2 === null) return -1;

return sortAsc ? b1 - b2 : b2 - b1;
}

    // Numeric sort if possible
    let n1 = parseFloat(raw1);
    let n2 = parseFloat(raw2);

    if(!isNaN(n1) && !isNaN(n2)){
        n1 = Math.round(n1 * 1000) / 1000;
        n2 = Math.round(n2 * 1000) / 1000;
        return sortAsc ? n1 - n2 : n2 - n1;
    }

    // Otherwise text sort
    return sortAsc
        ? raw1.localeCompare(raw2)
        : raw2.localeCompare(raw1);

function slugifyName(name){
  return String(name || "")
    .toLowerCase()
    .replace(/[^a-z0-9]/g,"");
}

function slugifySchool(school){
  return String(school || "")
    .toLowerCase()
    .replace(/[^a-z0-9]/g,"");
}

function createPlayerURL(name, school){
  const schoolSlug = slugifySchool(school);
  const nameSlug = slugifyName(name);

  return "/2026/" + schoolSlug + "/" + nameSlug;

function formatBannerPopupRounds(rawText, src){
    if(src === "afc.png" || src === "nfc.png"){
        return "";
    }

    const lines = String(rawText || "")
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean);

    if(!lines.length){
        return "Pick (Round):";
    }

    const remaining = lines.slice(1);

    if(!remaining.length){
        return "Pick (Round):";
    }

    const looksLikePickLine = remaining.every(line => /^\d+\s+\(\d+\)$/.test(line));

    if(!looksLikePickLine){
        return "";
    }

    const numberedLines = remaining.map((line, index) => `${index + 1}. ${line}`);
    return "Pick (Round):\n" + numberedLines.join("\n");
}

function setConferenceGlow(conference){
    const allTeamLogos = document.querySelectorAll(".hero-banner .team-corner-logo");
    allTeamLogos.forEach(logo => logo.classList.remove("conference-glow"));

    if(conference === "afc"){
        afcTeamLogoSources.forEach(src => {
            const el = document.querySelector(`.hero-banner .team-corner-logo[src="${src}"]`);
            if(el) el.classList.add("conference-glow");
        });
    }

    if(conference === "nfc"){
        nfcTeamLogoSources.forEach(src => {
            const el = document.querySelector(`.hero-banner .team-corner-logo[src="${src}"]`);
            if(el) el.classList.add("conference-glow");
        });
    }
}

function clearConferenceGlow(){
    if(lockedConference){
        setConferenceGlow(lockedConference);
        return;
    }
    setConferenceGlow(null);
}

function showBannerTeamPopup(imgEl, mouseEvent){
    const popup = document.getElementById("bannerTeamPopup");
    const titleEl = document.getElementById("bannerTeamPopupTitle");
    const picksEl = document.getElementById("bannerTeamPopupPicks");
    const roundsEl = document.getElementById("bannerTeamPopupRounds");
    const logoEl = document.getElementById("bannerTeamPopupLogo");

    const src = imgEl.getAttribute("src") || "";
    const popupInfo = bannerPopupData[src] || {
        title: imgEl.getAttribute("alt") || "Team",
        draftPicks: "Draft Picks: ",
        picksRound: ""
    };

    const isConference = src === "afc.png" || src === "nfc.png";

    popup.classList.toggle("compact-conference", isConference);

    if(isConference && window.innerWidth >= 900){
        if(src === "afc.png"){
            titleEl.textContent = "American Football Conference\n(AFC)";
        } else {
            titleEl.textContent = "National Football Conference\n(NFC)";
        }
    } else {
        titleEl.textContent = popupInfo.title;
    }

    picksEl.textContent = popupInfo.draftPicks;
    roundsEl.textContent = formatBannerPopupRounds(popupInfo.picksRound, src);
    logoEl.src = src;
    logoEl.alt = popupInfo.title;

    const rect = imgEl.getBoundingClientRect();
    logoEl.style.width = rect.width + "px";
    logoEl.style.height = rect.height + "px";

    popup.style.display = "block";
    moveBannerTeamPopup(mouseEvent);
}
function moveBannerTeamPopup(e){
    const popup = document.getElementById("bannerTeamPopup");
    if(popup.style.display !== "block") return;

    const offsetX = 16;
    const offsetY = 16;
    const popupWidth = popup.offsetWidth || 270;
    const popupHeight = popup.offsetHeight || 160;

    let left = e.clientX + offsetX;
    let top = e.clientY + offsetY;

    if(left + popupWidth > window.innerWidth - 10){
        left = e.clientX - popupWidth - 12;
    }

    if(top + popupHeight > window.innerHeight - 10){
        top = e.clientY - popupHeight - 12;
    }

    if(left < 10) left = 10;
    if(top < 10) top = 10;

    popup.style.left = left + "px";
    popup.style.top = top + "px";
}

function hideBannerTeamPopup(){
    const popup = document.getElementById("bannerTeamPopup");
    popup.style.display = "none";
    popup.classList.remove("compact-conference");
}

function initializeBannerLogoPopups(){
    const bannerLogos = document.querySelectorAll(".hero-banner .team-corner-logo, .hero-banner .corner-logo");

    bannerLogos.forEach(img => {
        img.addEventListener("mouseenter", (e) => {
            if(window.innerWidth < 900) return;

            activeBannerLogo = img;
            clearTimeout(bannerPopupTimer);

            const src = img.getAttribute("src") || "";
            if(src === "afc.png") setConferenceGlow("afc");
            else if(src === "nfc.png") setConferenceGlow("nfc");
            else clearConferenceGlow();

            bannerPopupTimer = setTimeout(() => {
                if(activeBannerLogo === img){
                    showBannerTeamPopup(img, e);
                }
            }, 500);
        });

        img.addEventListener("mousemove", (e) => {
            if(window.innerWidth < 900) return;
            moveBannerTeamPopup(e);
        });

        img.addEventListener("mouseleave", () => {
            if(window.innerWidth < 900) return;
            clearTimeout(bannerPopupTimer);
            activeBannerLogo = null;
            hideBannerTeamPopup();
            clearConferenceGlow();
        });

        img.addEventListener("click", (e) => {
            e.preventDefault();
            e.stopPropagation();

            const src = img.getAttribute("src") || "";
            const isConferenceLogo = src === "afc.png" || src === "nfc.png";

            if(window.innerWidth >= 900){
                if(isConferenceLogo){
                    lockedConference = lockedConference === (src === "afc.png" ? "afc" : "nfc")
                        ? null
                        : (src === "afc.png" ? "afc" : "nfc");

                    clearConferenceGlow();
                    activeBannerLogo = img;
                    showBannerTeamPopup(img, e);
                }
                return;
            }

            const popup = document.getElementById("bannerTeamPopup");
            const sameLogoOpen =
                popup.style.display === "block" &&
                activeBannerLogo === img;

            if(sameLogoOpen){
                activeBannerLogo = null;
                hideBannerTeamPopup();
                return;
            }

            activeBannerLogo = img;
            showBannerTeamPopup(img, e);
        });
    });

    document.addEventListener("click", (e) => {
        const clickedLogo = e.target.closest(".hero-banner .team-corner-logo, .hero-banner .corner-logo");

        if(window.innerWidth >= 900){
            if(clickedLogo) return;
            lockedConference = null;
            clearConferenceGlow();
            hideBannerTeamPopup();
            return;
        }

        if(clickedLogo) return;

        activeBannerLogo = null;
        hideBannerTeamPopup();
    });
}
function startDraftCountdown(){

    const draftDate = new Date("2026-04-23T20:00:00-04:00");

  function scoreboardUpdate(id,val,padLength=2){
    const el = document.getElementById(id);
    const nextVal = padLength === 0 ? String(val) : String(val).padStart(padLength,"0");

    if(el.dataset.val === nextVal) return;

    el.dataset.val = nextVal;
    el.textContent = nextVal;

    el.classList.remove("scoreboard-flash");
    void el.offsetWidth;
    el.classList.add("scoreboard-flash");
}

    function updateCountdown(){

        const now = new Date();
        const diff = draftDate - now;

       if(diff <= 0){
    scoreboardUpdate("days",0,0);
    scoreboardUpdate("hours",0,2);
    scoreboardUpdate("minutes",0,2);
    scoreboardUpdate("seconds",0,2);
    return;
}

        const days = Math.floor(diff/(1000*60*60*24));
        const hours = Math.floor((diff/(1000*60*60))%24);
        const minutes = Math.floor((diff/(1000*60))%60);
        const seconds = Math.floor((diff/1000)%60);

scoreboardUpdate("days",days,0);
scoreboardUpdate("hours",hours,2);
scoreboardUpdate("minutes",minutes,2);
scoreboardUpdate("seconds",seconds,2);
    }

    updateCountdown();
    setInterval(updateCountdown,1000);
}

initializeBannerLogoPopups();
startDraftCountdown();
