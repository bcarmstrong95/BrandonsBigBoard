body{background:black;color:white;font-family:Arial;margin:0;}

table{

}
th, td{
    padding:4px 8px;

/* flip animation */

@keyframes flipAnim{

<script>
const csvUrl="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0uaGV-62aAS74y5I-HVKCtGd8l5vy0iaNOErDHjQBFXNt2kDKhAEUMRQDGckqQoJqjUtwnKqTWqgR/pub?gid=0&single=true&output=csv";

let headers=[], data=[], filteredData=[];
let currentSort=-1, sortAsc=true;
let heightIndex=-1, positionIndex=-1;
let handIndex=-1, armIndex=-1, wingspanIndex=-1;
let broadIndex=-1;

let bColorIndex=-1;

let searchTerm="";
let selectedPositions=[];

const positionColors={

function gcd(a,b){ return b?gcd(b,a%b):a; }

function roundThousandth(val){
let num=parseFloat(val);
if(isNaN(num)) return val;
return Math.round(num*1000)/1000;
}

function decimalToFraction(decimal){

let num = parseFloat(decimal);
if(isNaN(num)) return decimal;

// Work only with decimal portion (0–1)
let denom = 8;
let numerator = Math.round(num * denom);

if(numerator === 0) return "";
if(numerator === denom) return "1";

let divisor = gcd(numerator, denom);
numerator /= divisor;
denom /= divisor;

return numerator + "/" + denom;
}

function fractionToDecimal(val){
if(!val||val==="-" ) return null;
let clean=val.replace(/"/g,"").trim();
if(clean.includes("/")){
let parts=clean.split(" ");
let whole=parseFloat(parts[0])||0;
let frac=0;
if(parts[1]){
let f=parts[1].split("/");
frac=parseFloat(f[0])/parseFloat(f[1]);
}
return whole+frac;
}
return parseFloat(clean);
}

function heightToInches(val){
if(!val||val==="-" ) return null;
let clean=val.replace(/"/g,"");
let parts=clean.split("'");

let feet=parseFloat(parts[0]) || 0;
let inches = parts[1] ? fractionToDecimal(parts[1]) : 0;

return (feet*12) + (inches || 0);
}

Papa.parse(csvUrl,{
download:true,
skipEmptyLines:true,
complete:function(results){

headers=results.data[1].map(h=>h.trim());
heightIndex=headers.findIndex(h=>h.toLowerCase()==="height");
positionIndex=headers.findIndex(h=>h.toLowerCase()==="pos");
handIndex=headers.findIndex(h=>h.toLowerCase()==="hand");
armIndex=headers.findIndex(h=>h.toLowerCase()==="arm");
wingspanIndex=headers.findIndex(h=>h.toLowerCase()==="wingspan");
broadIndex=headers.findIndex(h=>h.toLowerCase()==="broad");
bColorIndex = headers.findIndex(h=>h.toLowerCase().includes("b# color"));
cColorIndex = headers.findIndex(h=>h.toLowerCase().includes("c# color"));

data=results.data.slice(2).filter(r=>r.length===headers.length);

// Keep sheet values exactly as-is
data = data.map(row => row.map(cell => cell));

filteredData=[...data];

createHeaders();
initializeFilters();
applyFilters();


}
});

function sortTable(col){

    let header=headers[col].toLowerCase();

if(currentSort === col){
    sortAsc = !sortAsc;
}else{
    currentSort = col;

    // FIRST TWO COLUMNS → always low to high on first click
    if(col === 0 || col === 1){
        sortAsc = true;
    }

    // Age + 40 → lowest first
    else if(
        header === "age" ||
        header === "40" ||
        header.includes("40")
    ){
        sortAsc = true;
    }

    // Name / School / Pos → A–Z first
    else if(
        header === "name" ||
        header === "school" ||
        header === "pos"
    ){
        sortAsc = true;
    }

    // Everything else → high to low first
    else{
        sortAsc = false;
    }
}
filteredData.sort((a,b)=>{

    let raw1 = String(a[col] ?? "").trim();
    let raw2 = String(b[col] ?? "").trim();

    // Force these values to ALWAYS go to bottom
    const invalidValues = ["", "-", "0", "#DIV/0!"];

    let isInvalid1 = invalidValues.includes(raw1);
    let isInvalid2 = invalidValues.includes(raw2);

    if(isInvalid1 && isInvalid2) return 0;
    if(isInvalid1) return 1;
    if(isInvalid2) return -1;

    // HEIGHT sorting
    if(col === heightIndex){
        let h1 = heightToInches(raw1);
        let h2 = heightToInches(raw2);
        return sortAsc ? h1 - h2 : h2 - h1;
    }

    // HAND / ARM / WINGSPAN sorting
    if(
        col === handIndex ||
        col === armIndex ||
        col === wingspanIndex
    ){
        let f1 = fractionToDecimal(raw1);
        let f2 = fractionToDecimal(raw2);
        return sortAsc ? f1 - f2 : f2 - f1;
    }
    // BROAD sorting (10'5")
if(col === broadIndex){

    function broadToInches(val){
        if(!val) return null;

        let match = val.match(/(\d+)\s*['’]\s*(\d+)\s*"/);
        if(!match) return null;

        let feet = parseInt(match[1]);
        let inches = parseInt(match[2]);

        return (feet * 12) + inches;
    }

    let b1 = broadToInches(raw1);
    let b2 = broadToInches(raw2);

    return sortAsc ? b1 - b2 : b2 - b1;
}

    // Numeric sort if possible
    let n1 = parseFloat(raw1);
    let n2 = parseFloat(raw2);

    if(!isNaN(n1) && !isNaN(n2)){
        n1 = Math.round(n1 * 1000) / 1000;
        n2 = Math.round(n2 * 1000) / 1000;
        return sortAsc ? n1 - n2 : n2 - n1;
    }

    // Otherwise text sort
    return sortAsc
        ? raw1.localeCompare(raw2)
        : raw2.localeCompare(raw1);

});

    document.querySelectorAll("th").forEach(th=>{
        th.classList.remove("sorted");
        th.querySelector(".arrow").textContent="";
    });

    const active=document.querySelectorAll("th")[col];
    active.classList.add("sorted");
    active.querySelector(".arrow").textContent=sortAsc?"▲":"▼";

}
function displayRows(){
const tbody=document.querySelector("#data-table tbody");
tbody.innerHTML="";

filteredData.forEach(r=>{
const tr=document.createElement("tr");

if(positionIndex>-1){
let pos=r[positionIndex];
if(positionColors[pos]) tr.style.color=positionColors[pos];
}

r.forEach((c,i)=>{
const td=document.createElement("td");

if(headers[i].toLowerCase().includes("school")){

    const cleanSchool = String(c).trim();

    if(schoolLogos[cleanSchool]){

    const extraClass = largeLogos.includes(cleanSchool)
        ? "school-logo logo-large"
        : "school-logo";

    td.innerHTML = `<img src="${schoolLogos[cleanSchool]}" class="${extraClass}">`;
}
    else{
        td.textContent = c;
    }
}
else{

    let displayValue = c;
    let header = headers[i].toLowerCase();
    const headerClean = headers[i].trim().toLowerCase();

if(headerClean === "b#"){

    let pos = r[positionIndex];
    let circleColor = positionColors[pos] || "#444";

    td.innerHTML =
    `<div style="
        background:${circleColor};
        color:white;
        font-weight:bold;
        font-size:1.5em;
        width:32px;
        height:32px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        margin:auto;
    ">${c}</div>`;

    tr.appendChild(td);
    return; // prevents overwrite later
}

if(headerClean === "c#" && cColorIndex > -1){
    const colorVal = String(r[cColorIndex] || "").trim();
    if(colorVal) td.style.color = colorVal;
}

// Convert measurement columns
if(
    i === heightIndex ||
    i === handIndex ||
    i === armIndex ||
    i === wingspanIndex
){

    let original = String(c);

    // 🔥 If sheet already contains a fraction → KEEP EXACTLY AS-IS
    if(original.includes("/")){
        displayValue = original;
    }
    else{

        let hasQuote = original.includes('"');
        let clean = original.replace(/"/g,"").trim();

        // HEIGHT column (example: 6'2.75)
        if(i === heightIndex && clean.includes("'")){

            let parts = clean.split("'");
            let feet = parts[0];
            let inchesDecimal = parseFloat(parts[1]);

            if(!isNaN(inchesDecimal)){
                let whole = Math.floor(inchesDecimal);
                let decimal = inchesDecimal - whole;

                let fraction = decimal > 0
                    ? " " + decimalToFraction(decimal)
                    : "";

                displayValue = `${feet}'${whole}${fraction}`;
            }
            else{
                displayValue = clean;
            }
        }
        else{
            let num = parseFloat(clean);

            if(!isNaN(num)){
                let whole = Math.floor(num);
                let decimal = num - whole;

                let fraction = decimal > 0
                    ? " " + decimalToFraction(decimal)
                    : "";

                displayValue = `${whole}${fraction}`;
            }
            else{
                displayValue = clean;
            }
        }

        if(hasQuote){
            displayValue += '"';
        }
    }
}
else{

    let headerName = headers[i].toLowerCase();

    // Do NOT modify Vertical or Broad
    if(
        headerName === "vertical" ||
        headerName === "broad"
    ){
        displayValue = c; // keep EXACTLY as sheet
    }
    else{

        let num = parseFloat(c);

        if(!isNaN(num)){
            displayValue = (Math.round(num * 1000) / 1000).toFixed(3);
            displayValue = displayValue.replace(/\.?0+$/, '');
        }
    }
}

    td.textContent = displayValue;
}

if(i===currentSort) td.classList.add("active-col");
tr.appendChild(td);
});
tbody.appendChild(tr);
});

}
function initializeFilters(){

    const buttonContainer = document.getElementById("positionButtons");

    if(positionIndex > -1){

        // Custom Order
        const orderedPositions = [
            "QB","RB","WR","TE","IOL","OT",
            "BREAK1",
            "DT","EDGE","LB","S","CB",
            "BREAK2",
            "K","P","LS"
        ];

        orderedPositions.forEach(pos => {

            // Insert visual gap
            if(pos === "BREAK1" || pos === "BREAK2"){
                const spacer = document.createElement("div");
                spacer.style.flexBasis = "100%";
                spacer.style.height = "8px";
                buttonContainer.appendChild(spacer);
                return;
            }

            const button = document.createElement("button");
            button.textContent = pos;
            button.classList.add("position-btn");

            button.addEventListener("click", () => {

                if(selectedPositions.includes(pos)){
                    selectedPositions = selectedPositions.filter(p => p !== pos);

                    button.classList.remove("active");
                    button.style.background = "#111";
                    button.style.borderColor = "#444";
                } 
                else {
                    selectedPositions.push(pos);
                    button.classList.add("active");

                    // Special teams = gray
                    if(pos === "K" || pos === "P" || pos === "LS"){
                        button.style.background = "gray";
                        button.style.borderColor = "gray";
                    }
                    else{
                        button.style.background = positionColors[pos] || "#4169E1";
                        button.style.borderColor = positionColors[pos] || "#4169E1";
                    }
                }

                applyFilters();
            });

            buttonContainer.appendChild(button);
        });
    }

    document.getElementById("searchInput").addEventListener("input", e=>{
        searchTerm = e.target.value.toLowerCase();
        applyFilters();
    });
}

function applyFilters(){

    filteredData=data.filter(row=>{

        const matchesSearch=row.some(cell=>
            String(cell).toLowerCase().includes(searchTerm)
        );

       const matchesPosition =
    positionIndex === -1 ||
    selectedPositions.length === 0 ||
    selectedPositions.includes(row[positionIndex]);

        return matchesSearch && matchesPosition;
    });

    // Re-apply current sort if one exists
   if(currentSort !== -1){
    sortTable(currentSort);
} else {
    displayRows();
}

document.getElementById("prospectCount").textContent = filteredData.length;
}
function createHeaders(){
const thead=document.querySelector("#data-table thead");
const row=document.createElement("tr");
headers.forEach((h,i)=>{
const th=document.createElement("th");
th.innerHTML=h+' <span class="arrow"></span>';
th.addEventListener("click",()=>sortTable(i));
row.appendChild(th);
});
thead.appendChild(row);
}

 /* ================================
   NFL Draft Countdown Timer
================================ */

function startDraftCountdown(){

    const draftDate = new Date("2026-04-23T20:00:00-04:00");

    function updateCountdown(){

        const now = new Date();
        const diff = draftDate - now;

        if(diff <= 0){
            document.getElementById("days").textContent="00";
            document.getElementById("hours").textContent="00";
            document.getElementById("minutes").textContent="00";
            document.getElementById("seconds").textContent="00";
            return;
        }

        const days = Math.floor(diff/(1000*60*60*24));
        const hours = Math.floor((diff/(1000*60*60))%24);
        const minutes = Math.floor((diff/(1000*60))%60);
        const seconds = Math.floor((diff/1000)%60);

        document.getElementById("days").textContent = days;
        document.getElementById("hours").textContent = hours.toString().padStart(2,"0");
        document.getElementById("minutes").textContent = minutes.toString().padStart(2,"0");
        document.getElementById("seconds").textContent = seconds.toString().padStart(2,"0");
    }

    updateCountdown();
    setInterval(updateCountdown,1000);
}

startDraftCountdown();
