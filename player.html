function gcd(a,b){ return b ? gcd(b, a % b) : a; }

function decimalToFraction(decimal){
  let num = parseFloat(decimal);
  if(isNaN(num)) return decimal;

  let denom = 8;
  let numerator = Math.round(num * denom);

  if(numerator === 0) return "";
  if(numerator === denom) return "1";

  let divisor = gcd(numerator, denom);
  numerator /= divisor;
  denom /= divisor;

  return numerator + "/" + denom;
}

function formatMeasurement(value, isHeight = false){
  let original = String(value ?? "");
  if(!original) return "-";

  if(original.includes("/")) return original;

  let hasQuote = original.includes('"');
  let clean = original.replace(/"/g,"").trim();

  if(isHeight && clean.includes("'")){
    let parts = clean.split("'");
    let feet = parts[0];
    let inchesDecimal = parseFloat(parts[1]);

    if(!isNaN(inchesDecimal)){
      let whole = Math.floor(inchesDecimal);
      let decimal = inchesDecimal - whole;
      let fraction = decimal > 0 ? " " + decimalToFraction(decimal) : "";
      let out = `${feet}'${whole}${fraction}`;
      if(hasQuote) out += '"';
      return out;
    }
  } else {
    let num = parseFloat(clean);
    if(!isNaN(num)){
      let whole = Math.floor(num);
      let decimal = num - whole;
      let fraction = decimal > 0 ? " " + decimalToFraction(decimal) : "";
      let out = `${whole}${fraction}`;
      if(hasQuote) out += '"';
      return out;
    }
  }

  return original;
}

function slugify(name){
  return String(name || "")
    .toLowerCase()
    .replace(/[^a-z0-9]/g,"");
}

function slugifySchool(school){
  return String(school || "")
    .toLowerCase()
    .replace(/[^a-z0-9]/g,"");
}

function getPlayerInfoFromURL(){
  const url = new URL(window.location.href);
  const rawPath = url.searchParams.get("p") || window.location.pathname;
  const path = rawPath.replace(/\/+$/,"");
  const parts = path.split("/").filter(Boolean);

  const idx = parts.findIndex(part => part === "2026");
  if(idx === -1 || parts.length < idx + 3) return null;

  return {
    schoolSlug: parts[idx + 1].toLowerCase(),
    playerSlug: parts[idx + 2].toLowerCase()
  };
}

function getValue(row, headers, headerName){
  const idx = headers.findIndex(h => h.toLowerCase() === headerName.toLowerCase());
  return idx > -1 ? row[idx] : "";
}

function getCircleTextColor(pos){
  return (pos === "IOL" || pos === "OT") ? "black" : "white";
}

function renderPlayer(row, headers){
  const name = getValue(row, headers, "name");
  const school = getValue(row, headers, "school");
  const pos = getValue(row, headers, "pos");
  const height = formatMeasurement(getValue(row, headers, "height"), true);
  const weight = getValue(row, headers, "weight") || "-";
  const age = getValue(row, headers, "age") || "-";
  const avgRaw = getValue(row, headers, "avg");
let avg = avgRaw || "-";

const avgNum = parseFloat(avgRaw);
if(!isNaN(avgNum)){
  avg = (Math.round(avgNum * 1000) / 1000).toFixed(3).replace(/\.?0+$/, "");
}
  const bnum = getValue(row, headers, "b#") || "-";
  const cnum = getValue(row, headers, "c#") || "-";
  const forty = getValue(row, headers, "40") || "-";
  const vertical = getValue(row, headers, "vertical") || "-";
  const broad = getValue(row, headers, "broad") || "-";
  const hand = formatMeasurement(getValue(row, headers, "hand"));
  const arm = formatMeasurement(getValue(row, headers, "arm"));
  const wingspan = formatMeasurement(getValue(row, headers, "wingspan"));
  const pfn = getValue(row, headers, "PFN") || "-";
  const pff = getValue(row, headers, "PFF") || "-";
  const nfldb = getValue(row, headers, "NFLDB") || "-";

  const circleColor = positionColors[pos] || "#444";
  const circleTextColor = getCircleTextColor(pos);
  const schoolLogo = schoolLogos[school] ? `<img src="${schoolLogos[school]}" class="school-logo" alt="${school} logo">` : "";
  const headshotSlug = slugify(name);

  document.title = `${name} | Brandon's Big Board`;

  document.getElementById("playerProfile").innerHTML = `
    <div class="profile-card">
      <div class="profile-header">
        <div class="headshot-box">
          <img src="/blank.jpg" alt="${name}" onerror="this.src='/blank.jpg'">
        </div>

        <div class="player-main">
          <h1>${name}</h1>
          <div class="player-school-row">
            ${schoolLogo}
            <div class="player-school">${school}</div>
          </div>
          <div class="player-pos">${pos}</div>
        </div>

        <div class="rank-circle" style="background:${circleColor};color:${circleTextColor};">
          ${bnum}
        </div>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-label">Position</div>
          <div class="info-value">${pos}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Height</div>
          <div class="info-value">${height}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Weight</div>
          <div class="info-value">${weight}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Age</div>
          <div class="info-value">${age}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Brandon Rank</div>
          <div class="info-value">${bnum}</div>
        </div>
        <div class="info-box">
          <div class="info-label">Consensus Rank</div>
          <div class="info-value">${cnum}</div>
        </div>
        <div class="info-box">
          <div class="info-label">AVG Grade</div>
          <div class="info-value">${avg}</div>
        </div>
        <div class="info-box">
          <div class="info-label">40 Time</div>
          <div class="info-value">${forty}</div>
        </div>
      </div>

      <h3 class="section-title">Testing / Measurements</h3>
      <div class="metrics-grid" style="margin-bottom:24px;">
        <div class="metric-box">
          <div class="metric-name">Vertical</div>
          <div class="metric-value">${vertical}</div>
        </div>
        <div class="metric-box">
          <div class="metric-name">Broad Jump</div>
          <div class="metric-value">${broad}</div>
        </div>
        <div class="metric-box">
          <div class="metric-name">Hand</div>
          <div class="metric-value">${hand}</div>
        </div>
        <div class="metric-box">
          <div class="metric-name">Arm</div>
          <div class="metric-value">${arm}</div>
        </div>
        <div class="metric-box">
          <div class="metric-name">Wingspan</div>
          <div class="metric-value">${wingspan}</div>
        </div>
      </div>

      <h3 class="section-title">Grades</h3>
      <div class="metrics-grid">
        <div class="metric-box">
          <div class="metric-name">PFN</div>
          <div class="metric-value">${pfn}</div>
        </div>
        <div class="metric-box">

        </div>

        </div>
      </div>
    </div>

}

function renderNotFound(){
  document.getElementById("playerProfile").innerHTML = `
    <div class="profile-card">
      <div class="not-found">Player not found.</div>
    </div>
  `;
}

const playerInfo = getPlayerInfoFromURL();

if(!playerInfo){
  renderNotFound();
} else {
  Papa.parse(csvUrl, {
    download: true,
    skipEmptyLines: true,
    complete: function(results){
      const headers = results.data[1].map(h => h.trim());

      const data = results.data.slice(2)
        .filter(r => r.some(cell => String(cell).trim() !== ""))
        .map(r => {
          while(r.length < headers.length) r.push("");
          return r.slice(0, headers.length);
        });

      const row = data.find(r => {
        const rowNameSlug = slugify(getValue(r, headers, "name"));
        const rowSchoolSlug = slugifySchool(getValue(r, headers, "school"));

        return rowNameSlug === playerInfo.playerSlug &&
               rowSchoolSlug === playerInfo.schoolSlug;
      });

      if(row){
        renderPlayer(row, headers);
      } else {
        renderNotFound();
      }
    }
  });
}
</script>
