<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Player Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    background:black;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
    padding:0;
}
.header{
    padding:20px;
    text-align:center;
    border-bottom:1px solid #222;
}
.player-container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
    gap:20px;
}
.player-headshot{
    width:200px;
    height:250px;
    background:#111;
    border:1px solid #333;
    display:flex;
    align-items:center;
    justify-content:center;
}
.player-headshot img{
    width:100%;
    height:100%;
    object-fit:cover;
}
.player-info{
    max-width:400px;
    display:flex;
    flex-direction:column;
    gap:12px;
}
.player-info h1{
    margin:0;
    font-size:28px;
    font-weight:bold;
}
.player-info img{
    height:60px;
    width:auto;
}
.stats-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px 20px;
    font-size:16px;
}
.stats-grid div{
    padding:6px 0;
}
.bnum-circle{
    width:80px;
    height:80px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    font-weight:bold;
    margin:10px 0;
}
</style>
</head>
<body>

<div class="header">
    <h2>Brandon's Big Board 2026 - Player Profile</h2>
</div>

<div class="player-container">
    <div class="player-headshot">
        <img id="headshot" src="" alt="Player Headshot">
    </div>
    <div class="player-info">
        <h1 id="playerName"></h1>
        <img id="schoolLogo" src="" alt="School Logo">
        <div class="bnum-circle" id="bnum"></div>
        <div class="stats-grid">
            <div>POS: <span id="pos"></span></div>
            <div>C#: <span id="cnum"></span></div>
            <div>Height: <span id="height"></span></div>
            <div>Weight: <span id="weight"></span></div>
            <div>Age: <span id="age"></span></div>
            <div>AVG: <span id="avg"></span></div>
            <div>40-Yard: <span id="forty"></span></div>
            <div>Vertical: <span id="vertical"></span></div>
            <div>Broad: <span id="broad"></span></div>
        </div>
    </div>
</div>

<script>
// Load selected player from sessionStorage
const playerData = JSON.parse(sessionStorage.getItem("selectedPlayer"));

if(!playerData){
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>No player selected. Go back to <a href='index.html'>Big Board</a></h2>";
} else {
    document.getElementById("playerName").textContent = playerData.name;
    document.getElementById("headshot").src = "headshots/" + (playerData.name.toLowerCase().replace(/[^a-z0-9]/g,"")) + ".jpg";
    document.getElementById("headshot").onerror = () => {document.getElementById("headshot").src="headshots/default.jpg";};
    document.getElementById("schoolLogo").src = "logos/" + (playerData.school.replace(/ /g,"").replace(/\./g,"")) + ".png";
    document.getElementById("bnum").textContent = playerData.bnum;
    document.getElementById("bnum").style.background = "#4E2A84"; // You can customize by POS color if desired
    document.getElementById("pos").textContent = playerData.pos;
    document.getElementById("cnum").textContent = playerData.cnum;
    document.getElementById("height").textContent = playerData.height;
    document.getElementById("weight").textContent = playerData.weight;
    document.getElementById("age").textContent = playerData.age;
    document.getElementById("avg").textContent = playerData.avg;
    document.getElementById("forty").textContent = playerData.forty;
    document.getElementById("vertical").textContent = playerData.vertical;
    document.getElementById("broad").textContent = playerData.broad;
}
</script>

</body>
</html>
